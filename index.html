    <h2>最新動画</h2>

    <script>
        const API_KEY = "AIzaSyB-fUZ1xw7GkQKkM3kAGCmpKK-VNGd7sKM";
        const CHANNEL_ID = "UCAakuXYGZj0ifui88Ve0qLQ";
        const PLAYLIST_ID = CHANNEL_ID.replace(/^UC/, 'UU');

        async function fetchLatestVideo() {
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?key=${API_KEY}&playlistId=${PLAYLIST_ID}&part=snippet&maxResults=1`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (!data.items || data.items.length === 0) {
                    document.getElementById("latestVideo").innerText = "最新動画が見つかりませんでした。";
                    return;
                }
                const videoId = data.items[0].snippet.resourceId.videoId;
                document.getElementById("latestVideo").innerHTML = `
                    <iframe width="100%" style="max-width: 560px; aspect-ratio: 16/9;"
                            src="https://www.youtube-nocookie.com/embed/${videoId}"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                    </iframe>`;
            } catch (e) {
                document.getElementById("latestVideo").innerText = "エラーが発生しました。";
            }
        }
        fetchLatestVideo();
    </script>
